name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: platform

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.changes.outputs.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            platform:
              - 'platform/**'
              - '.github/workflows/ci.yml'

  lint:
    needs: filter
    if: needs.filter.outputs.platform == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  type-check:
    needs: filter
    if: needs.filter.outputs.platform == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/package-lock.json
      - run: npm ci
      - run: npm run check

  build:
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Verify static output
        run: |
          test -f build/index.html
          test -f build/methodology/index.html
